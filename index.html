<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>meshy2glb — local .meshy viewer</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #111; color: #eee;
               font: 13px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  canvas { display: block; }

  #status {
    position: fixed; top: 12px; left: 12px; z-index: 10;
    background: rgba(0,0,0,.6); padding: 10px 14px; border-radius: 8px;
    max-width: 520px;
  }
  #status.ok   { color: #6fdc8c; }
  #status.err  { color: #ff8a8a; white-space: pre-wrap; }
  #status.work { color: #ffd166; }
  #status a    { color: #aef; }

  #drop {
    position: fixed; inset: 0;
    background: rgba(50,90,200,.25);
    border: 4px dashed #6aa;
    display: none; align-items: center; justify-content: center;
    font-size: 22px; color: #fff; z-index: 20;
    pointer-events: none;
  }
  #drop.show { display: flex; }

  #empty {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: #888; text-align: center; cursor: pointer;
    user-select: none; -webkit-user-select: none;
  }
  #empty:hover .big { color: #fff; }
  #empty.hide { display: none; }
  #empty .big { font-size: 22px; color: #ccc; transition: color .15s; }
  #empty .hint { font-size: 11px; color: #666; margin-top: 4px; }

  #brand {
    position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
    text-align: center; pointer-events: none; z-index: 5;
  }
  #brand h1 {
    margin: 0; font-size: 14px; font-weight: 600; color: #ddd;
    letter-spacing: .02em;
  }
  #brand p {
    margin: 2px 0 0; font-size: 11px; color: #777;
  }

  #foot {
    position: fixed; bottom: 12px; right: 14px; z-index: 5;
    font-size: 11px; color: #666;
  }
  #foot a { color: #888; text-decoration: none; border-bottom: 1px dotted #555; }
  #foot a:hover { color: #ccc; }
  #foot .sep { margin: 0 6px; color: #444; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.169.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.169.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="brand">
  <h1>meshy2glb</h1>
  <p>convert <code>.meshy</code> → <code>.glb</code>, in your browser, offline</p>
</div>

<div id="status" class="ok">drop or click to load a .meshy file</div>
<div id="drop">drop a .meshy file to decrypt &amp; view</div>
<div id="empty">
  <div class="big">drop a <code>.meshy</code> file anywhere</div>
  <div>or a <code>.glb</code> to skip decryption</div>
  <div class="hint">click anywhere to pick a file</div>
</div>
<input id="picker" type="file" accept=".meshy,.glb" hidden>

<div id="foot">
  nothing leaves your browser<span class="sep">·</span>
  <a href="https://github.com/Amal-David/meshy2glb" target="_blank" rel="noopener">source</a>
</div>

<script type="module">
import { meshyToGlb, isMeshyFile, isGlbFile } from './src/decrypt.js';
import { Viewer } from './src/viewer.js';

const $status = document.getElementById('status');
const $drop   = document.getElementById('drop');
const $empty  = document.getElementById('empty');

const setStatus = (html, cls = 'work') => {
  $status.className = cls;
  $status.innerHTML = html;
  console.log('[meshy2glb]', html.replace(/<[^>]+>/g, ''));
};

const viewer = new Viewer();

async function handleBuffer(name, buffer) {
  $empty.classList.add('hide');
  const sizeMb = (buffer.byteLength / 1024 / 1024).toFixed(2);

  let glb;
  if (isGlbFile(buffer)) {
    setStatus(`${name} is already a .glb — rendering directly (${sizeMb} MB)`);
    glb = buffer;
  } else if (isMeshyFile(buffer)) {
    setStatus(`decrypting ${name} (${sizeMb} MB)…`);
    glb = await meshyToGlb(buffer);
  } else {
    throw new Error('not a .meshy or .glb file');
  }

  const { blobUrl, triangles } = await viewer.loadGLB(glb);
  const glbMb = (glb.byteLength / 1024 / 1024).toFixed(2);
  setStatus(
    `&#10003; ${name} &mdash; ${glbMb} MB GLB, ~${triangles.toLocaleString()} triangles ` +
    `&middot; <a href="${blobUrl}" download="${name.replace(/\.(meshy|glb)$/i,'')}.glb">download .glb</a>`,
    'ok'
  );
}

async function loadFile(file) {
  try {
    const buffer = await file.arrayBuffer();
    await handleBuffer(file.name, buffer);
  } catch (err) {
    let msg = err.message;
    if (/Malformed buffer data/i.test(msg) || /offset is out of bounds/i.test(msg)) {
      msg = `couldn't decode ${file.name} — this looks like a no-texture variant ` +
            `of .meshy that the clean-room decoder doesn't yet handle. ` +
            `Files with WebP textures work; texture-less ones are tracked as a known issue.`;
    }
    setStatus(`error: ${msg}`, 'err');
    console.error(err);
  }
}

// ── drag-and-drop ─────────────────────────────────────────────────────
addEventListener('dragover', (e) => { e.preventDefault(); $drop.classList.add('show'); });
addEventListener('dragleave', (e) => { if (e.target === document.body) $drop.classList.remove('show'); });
addEventListener('drop', (e) => {
  e.preventDefault();
  $drop.classList.remove('show');
  const file = e.dataTransfer.files[0];
  if (file) loadFile(file);
});

// ── click-to-pick ─────────────────────────────────────────────────────
const $picker = document.getElementById('picker');
$empty.addEventListener('click', () => $picker.click());
$picker.addEventListener('change', () => {
  const file = $picker.files?.[0];
  if (file) loadFile(file);
  $picker.value = '';
});
</script>

</body>
</html>
